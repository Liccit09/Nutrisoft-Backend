version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nutrisoft-postgres
    environment:
      POSTGRES_DB: nutrisoft_db
      POSTGRES_USER: nutrisoft_user
      POSTGRES_PASSWORD: nutrisoft_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/db/migration/init-schema.sql:/docker-entrypoint-initdb.d/01-init-schema.sql
    networks:
      - nutrisoft-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrisoft_user"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  nutrisoft-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local

