server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: nutrisoft-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/nutrisoft_db
    username: nutrisoft_user
    password: nutrisoft_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # ddl-auto: update preserves data between restarts
      # Options: create (recreate, loses data), create-drop, update (preserves), validate, none
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          fetch_size: 50
          batch_size: 25
        order_inserts: true
        order_updates: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    deserialization:
      fail-on-unknown-properties: false
      adjust-dates-to-context-time-zone: false

  mail:
    # Para desarrollo con Mailpit (Docker): host: localhost, port: 1025
    # Para producción: reemplazar con servidor SMTP real (Gmail, SendGrid, etc.)
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:noreply@nutrisoft.com}
    from-name: ${MAIL_FROM_NAME:Nutrisoft}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_STARTTLS_ENABLE:false}
            required: ${MAIL_STARTTLS_REQUIRED:false}
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# JWT Configuration
app:
  jwtSecret: ${JWT_SECRET:nutrisoft-secret-key-for-jwt-token-generation-and-validation-purpose-only}
  jwtExpirationMs: 86400000  # 24 hours
  jwtRefreshExpirationMs: 604800000  # 7 days
  resetTokenExpirationHours: 24
  frontend:
    baseUrl: ${FRONTEND_BASE_URL:http://localhost:3000}

logging:
  level:
    root: INFO
    com.nutrisoft: DEBUG
    org.springframework.web: DEBUG
    org.hibernate: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v1/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha

