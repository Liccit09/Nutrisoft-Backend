server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: nutrisoft-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/nutrisoft_db
    username: nutrisoft_user
    password: nutrisoft_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # ddl-auto: update preserves data between restarts
      # Options: create (recreate, loses data), create-drop, update (preserves), validate, none
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          fetch_size: 50
          batch_size: 25
        order_inserts: true
        order_updates: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    deserialization:
      fail-on-unknown-properties: false
      adjust-dates-to-context-time-zone: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    from: noreply@nutrisoft.com
    from-name: Nutrisoft
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# JWT Configuration
app:
  jwtSecret: ${JWT_SECRET:nutrisoft-secret-key-for-jwt-token-generation-and-validation-purpose-only}
  jwtExpirationMs: 86400000  # 24 hours
  resetTokenExpirationHours: 24
  frontend:
    baseUrl: ${FRONTEND_BASE_URL:http://localhost:3000}

logging:
  level:
    root: INFO
    com.nutrisoft: DEBUG
    org.springframework.web: DEBUG
    org.hibernate: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v1/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha

